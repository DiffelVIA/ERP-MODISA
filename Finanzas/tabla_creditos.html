<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Créditos</title>
    <script src="/timeout.js"> </script>
    <link rel="icon" type="image/x-icon" href="../img/MODISA-favicon.ico">
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <header id="header">
        <div>
            <img src="../img/logo.png" alt="logo" id="logo">
        </div>
        <nav>
      <ul>
        <li><a href="../principal.html?panel=finanzas">Volver a Panel Principal</a></li>
      </ul>
    </nav>
    </header>
    <main class="main-tabla">
        <h1>Consulta de Créditos</h1>
        <div class="contenedorFiltros">

            <div class="filtros" id="dropdownObra">
                <button type="button" class="btn-dropdown">Filtro Obra ▾</button>
                <div class="contenido-dropdown" id="filtroObra">
                </div>
            </div>

            <div class="filtros" id="dropdownProveedor">
                <button type="button" class="btn-dropdown">Filtro Proveedor ▾</button>
                <div class="contenido-dropdown" id="filtroProveedor">
                </div>
            </div>

            <div class="filtros" id="dropdownEstado">
                <button type="button" class="btn-dropdown">Filtro Estado ▾</button>
                <div class="contenido-dropdown" id="filtroEstado">
                </div>
            </div>
        </div>
        <div class="tabla">
            <table>
                <thead>
                    <tr>
                        <th>Proveedor</th>
                        <th>Referencia</th>
                        <th>Fecha</th>
                        <th>Vencimiento</th>
                        <th>Crédito</th> <th>Obra</th>
                        <th>Monto</th>
                        <th>Monto Pagado</th>
                        <th>Estatus</th>
                        <th>Observaciones</th>
                    </tr>
                </thead>
                <tbody id="cuerpo-tabla-creditos">
                    </tbody>
            </table>
        </div>
    </main>
    
    <footer id="footer">
        <p>Software especializado MODISA ®</p>
        <p>Esta aplicación web está diseñada exclusivamente para la consulta y gestión de Créditos</p>
    </footer>
    <script src="tablaCreditos.js"></script>
</body>
</html>
