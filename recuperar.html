<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña - MODISA</title>
    <link rel="icon" type="image/x-icon" href="/img/MODISA-favicon.ico">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <header id="header">
        <div>
            <img src="/img/logo.png" alt="logo" id="logo">
        </div>
    </header>

    <main class="index_main">
        <div id="contenedor-verificar" class="login-container">
            <h1>Restablecer Contraseña</h1>
            <p>
                Ingresa tu usuario y el correo electrónico registrado en el sistema para verificar tu identidad.
            </p>
            <form id="form-verificar">
                <div class="contenedor-formulario">
                    <label for="recuperar-usuario">Usuario</label>
                    <input type="text" id="recuperar-usuario" placeholder="Tu nombre de usuario" required>
                </div>
                <div class="contenedor-formulario">
                    <label for="recuperar-correo">Correo Electrónico</label>
                    <input type="email" id="recuperar-correo" placeholder="ejemplo@modisa.com" required>
                </div>
                <div class="contenedor-botones">
                    <button type="submit" id="descargar" class="btn">Verificar Datos</button>
                    <a href="index.html" style="margin-top: 15px; display: block; text-align: center; color: #007bff; text-decoration: none">Volver al Login</a>
                </div>
                <div id="error-verificar" class="error-msg" style="display: none;"></div>
            </form>
        </div>

        <div id="contenedor-nueva-pass" class="login-container" style="display: none;">
            <h1>Crear Nueva Contraseña</h1>
            <form id="form-nueva-pass">
                <div class="contenedor-formulario">
                    <label for="nueva-pass">Nueva Contraseña</label>
                    <input type="password" id="nueva-pass" placeholder="Mínimo 6 caracteres" minlength="6" required>
                </div>
                <div class="contenedor-formulario">
                    <label for="confirmar-pass">Confirmar Contraseña</label>
                    <input type="password" id="confirmar-pass" placeholder="Repite tu contraseña" minlength="6" required>
                </div>
                <div class="contenedor-botones">
                    <button type="submit" id="actualizar" class="btn">Actualizar Contraseña</button>
                </div>
                <div id="error-nueva" class="error-msg" style="display: none;"></div>
            </form>
        </div>
    </main>

    <footer id="footer">
        <p>Software especializado MODISA ® 2026</p>
    </footer>

    <script src="recuperar.js"></script>
</body>
</html>
